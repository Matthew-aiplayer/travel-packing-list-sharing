<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Packing List - 匯入清單</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      position: relative;
    }
    .lang-selector {
      position: absolute;
      top: 16px;
      right: 16px;
    }
    .lang-selector select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 13px;
      background: white;
      color: #555;
      cursor: pointer;
      outline: none;
    }
    .lang-selector select:hover {
      border-color: #4E7D96;
    }
    .logo {
      margin-bottom: 16px;
    }
    .logo img {
      border-radius: 18px;
      width: 80px;
      height: 80px;
    }
    h1 {
      color: #4E7D96;
      font-size: 24px;
      margin: 0 0 8px;
    }
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.5;
      margin: 8px 0 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      margin: 6px 0;
      transition: opacity 0.2s;
      width: 100%;
      box-sizing: border-box;
    }
    .btn:hover { opacity: 0.85; }
    .btn-open { background: #fd844c; color: white; }
    .btn-ios { background: #4E7D96; color: white; }
    .btn-android { background: #34A853; color: white; }
    .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .loading {
      color: #999;
      font-size: 14px;
      margin-top: 16px;
    }
    .fallback { display: none; }
    .show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-selector">
      <select id="langSelect" onchange="switchLang(this.value)">
        <option value="zh_TW">繁體中文</option>
        <option value="zh_CN">简体中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="hi">हिन्दी</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="bn">বাংলা</option>
        <option value="th">ไทย</option>
      </select>
    </div>
    <div class="logo">
      <img src="app_icon.png" alt="Travel Packing List">
    </div>
    <h1 id="title">正在開啟 Travel Packing List</h1>
    <p id="desc">嘗試開啟 App 匯入清單...</p>
    <div class="loading" id="loading">如果沒有自動開啟，請點擊下方按鈕</div>
    <div class="fallback" id="fallback">
      <p id="dlPrompt">請先下載 App，再點擊一鍵匯入：</p>
      <a class="btn btn-open" id="openLink" href="#">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M12 5l-6 6M12 5l6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="retryBtn">再試一次開啟 App</span>
      </a>
      <a class="btn btn-ios" href="https://apps.apple.com/us/app/travel-luggage-packing-list/id6749501943">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="white">
          <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.04 1.52-.05 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.897-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.702z"/>
        </svg>
        <span id="iosBtn">App Store 下載</span>
      </a>
      <a class="btn btn-android" href="https://play.google.com/store/apps/details?id=com.travel.luggagelist&pcampaignid=web_share">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="white">
          <path d="M4 2v20l17-10z"/>
        </svg>
        <span id="androidBtn">Google Play 下載</span>
      </a>
    </div>
  </div>

        dlPrompt: 'অনুগ্রহ করে প্রথমে অ্যাপ ডাউনলোড করুন, তারপর আমদানি করতে ক্লিক করুন:',
        retryBtn: 'আবার অ্যাপ খোলার চেষ্টা করুন',
        iosBtn: 'App Store থেকে ডাউনলোড করুন',

      },
      th: {
        title: 'กำลังเปิด Travel Packing List',
        desc: 'กำลังพยายามเปิดแอปเพื่อนำเข้ารายการ...',
        loading: 'หากไม่เปิดโดยอัตโนมัติ ให้คลิกปุ่มด้านล่าง',
        dlPrompt: 'กรุณาดาวน์โหลดแอปก่อน จากนั้นคลิกเพื่อนำเข้า:',
        retryBtn: 'ลองเปิดแอปอีกครั้ง',
        iosBtn: 'ดาวน์โหลดบน App Store',
        androidBtn: 'รับบน Google Play',
        invalidTitle: 'ลิงก์ไม่ถูกต้อง',

    function switchLang(lang) {
      const t = translations[lang] || translations.en;
      document.getElementById('title').textContent = t.title;
      document.getElementById('desc').textContent = t.desc;
      document.getElementById('loading').textContent = t.loading;
      document.getElementById('dlPrompt').textContent = t.dlPrompt;
      document.getElementById('retryBtn').textContent = t.retryBtn;
      document.getElementById('iosBtn').textContent = t.iosBtn;
      document.getElementById('androidBtn').textContent = t.androidBtn;
      localStorage.setItem('travelpack_lang', lang);
    }

    (function() {
      const savedLang = localStorage.getItem('travelpack_lang') || 'zh_TW';
      document.getElementById('langSelect').value = savedLang;
      switchLang(savedLang);

      const params = new URLSearchParams(window.location.search);
      const gistId = params.get('gistId');
      const fallback = document.getElementById('fallback');
      const loading = document.getElementById('loading');
      const openLink = document.getElementById('openLink');

      if (gistId) {
        const deepLink = 'travelpack://import?gistId=' + encodeURIComponent(gistId);
        openLink.href = deepLink;
        window.location.href = deepLink;
        setTimeout(function() {
          loading.style.display = 'none';
          fallback.classList.add('show');
        }, 2000);
      } else {
        const t = translations[savedLang] || translations.en;
        document.querySelector('h1').textContent = t.invalidTitle;
        document.querySelector('p').textContent = t.invalidDesc;
      }
    })();
  </script>
</body>
</html>
