<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Packing List - 匯入清單</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .logo {
      margin-bottom: 16px;
    }
    .logo img {
      border-radius: 18px;
      width: 80px;
      height: 80px;
    }
    h1 {
      color: #4E7D96;
      font-size: 24px;
      margin: 0 0 8px;
    }
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.5;
      margin: 8px 0 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      margin: 6px 0;
      transition: opacity 0.2s;
      width: 100%;
      box-sizing: border-box;
    }
    .btn:hover { opacity: 0.85; }
    .btn-open { background: #fd844c; color: white; }
    .btn-ios { background: #4E7D96; color: white; }
    .btn-android { background: #34A853; color: white; }
    .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .loading {
      color: #999;
      font-size: 14px;
      margin-top: 16px;
    }
    .fallback { display: none; }
    .show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="app_icon.png" alt="Travel Packing List">
    </div>
    <h1>正在開啟 Travel Packing List</h1>
    <p>嘗試開啟 App 匯入清單...</p>
    <div class="loading" id="loading">如果沒有自動開啟，請點擊下方按鈕</div>
    <div class="fallback" id="fallback">
      <p>請先下載 App，再點擊一鍵匯入：</p>
      <a class="btn btn-open" id="openLink" href="#">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M12 5l-6 6M12 5l6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        再試一次開啟 App
      </a>
      <a class="btn btn-ios" href="https://apps.apple.com/us/app/travel-luggage-packing-list/id6749501943">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="white">
          <path d="M16.7 13.3c-.1-2.5 2-3.7 2.1-3.7-.8-1.1-2-1.8-3.2-1.9-1.3-.1-2.6.8-3.3.8-.7 0-1.8-.8-3-.8-1.5 0-2.9.9-3.7 2.4-1.6 2.8-.4 6.9 1.1 9.1.8 1.1 1.7 2.4 2.9 2.4 1.2 0 1.7-.8 3.2-.8 1.5 0 1.9.8 3.2.8 1.3 0 2.2-1.2 3-2.3.9-1.4 1.3-2.7 1.3-2.8 0 0-2.5-1-2.6-3.8zM14.4 5.5c.7-.9 1.2-2.1 1-3.3-1 .1-2.2.7-2.9 1.6-.6.8-1.1 2.1-1 3.3 1.1.1 2.2-.6 2.9-1.6z"/>
        </svg>
        App Store 下載
      </a>
      <a class="btn btn-android" href="https://play.google.com/store/apps/details?id=com.travel.luggagelist&pcampaignid=web_share">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="white">
          <path d="M18.5 4.5l-9 9-3-3 9.5-7.1c.3-.2.7-.2 1 0 .3.2.5.6.4 1l.1.1zM2.5 5.5c0-.1 0-.3.1-.4l8.9 8-2.2 2.2-6.8-9.8zM18.5 19.5l-9-9 2.2-2.2 7.1 12.2c.1.3.4.5.7.5.2 0 .3 0 .5-.1.3-.2.5-.5.5-.9 0-.1 0-.2-.1-.3l-.9-.2zM10.5 13.5l-8.2 8.2c.1.1.2.2.4.3.3.2.7.1 1-.1l9.3-6-2.5-2.4zM13.5 14.5l-9.5 6.9c.3.2.7.2 1 0l8.5-5.7-2.5-2.5.5.6 1.5 1.5.5-.8z"/>
        </svg>
        Google Play 下載
      </a>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const gistId = params.get('gistId');
      const fallback = document.getElementById('fallback');
      const loading = document.getElementById('loading');
      const openLink = document.getElementById('openLink');

      if (gistId) {
        const deepLink = 'travelpack://import?gistId=' + encodeURIComponent(gistId);
        openLink.href = deepLink;
        window.location.href = deepLink;
        setTimeout(function() {
          loading.style.display = 'none';
          fallback.classList.add('show');
        }, 2000);
      } else {
        document.querySelector('h1').textContent = '連結無效';
        document.querySelector('p').textContent = '缺少匯入參數，請重新分享';
      }
    })();
  </script>
</body>
</html>
